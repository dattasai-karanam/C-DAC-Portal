<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C-DAC Portal - Advanced RBAC System</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Space Grotesk', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #6366f1, #8b5cf6); border-radius: 4px; }
        
        /* Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 40px rgba(99, 102, 241, 0.8); }
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes slide-up {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slide-down {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes slide-left {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scale-in {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes rotate-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float 6s ease-in-out infinite; animation-delay: 2s; }
        .animate-pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
        .animate-gradient { background-size: 200% 200%; animation: gradient-shift 8s ease infinite; }
        .animate-slide-up { animation: slide-up 0.6s ease-out forwards; }
        .animate-slide-down { animation: slide-down 0.5s ease-out forwards; }
        .animate-slide-left { animation: slide-left 0.6s ease-out forwards; }
        .animate-scale-in { animation: scale-in 0.4s ease-out forwards; }
        .animate-rotate-slow { animation: rotate-slow 20s linear infinite; }
        .animate-shimmer { 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        .animate-bounce-subtle { animation: bounce-subtle 2s ease-in-out infinite; }
        
        /* Delay Classes */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }
        
        /* Glass Effects */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .text-gradient-cyan {
            background: linear-gradient(135deg, #06b6d4, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Hover Effects */
        .hover-lift { transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .hover-glow { transition: all 0.3s ease; }
        .hover-glow:hover { box-shadow: 0 0 30px rgba(99, 102, 241, 0.5); }
        
        /* Background Patterns */
        .bg-grid {
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        .bg-dots {
            background-image: radial-gradient(rgba(99, 102, 241, 0.15) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            position: relative;
            overflow: hidden;
        }
        .btn-primary::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn-primary:hover::before { left: 100%; }
        
        .btn-outline {
            border: 2px solid transparent;
            background: linear-gradient(#0f172a, #0f172a) padding-box,
                        linear-gradient(135deg, #6366f1, #a855f7) border-box;
        }
        
        /* Card Hover Line */
        .card-line {
            position: relative;
        }
        .card-line::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #6366f1, #a855f7, #ec4899);
            transition: width 0.4s ease;
            border-radius: 4px 4px 0 0;
        }
        .card-line:hover::before { width: 100%; }
        
        /* Input Focus Ring */
        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }
        
        /* Sidebar Active Indicator */
        .sidebar-active {
            position: relative;
        }
        .sidebar-active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(180deg, #6366f1, #a855f7);
            border-radius: 0 4px 4px 0;
        }
        
        /* Noise Overlay */
        .noise::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }
    </style>
</head>
<body class="bg-slate-950 text-white overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, createContext, useContext } = React;

        // ============================================
        // CONSTANTS
        // ============================================
        const ROLES = { STUDENT: 'STUDENT', FACULTY: 'FACULTY', ADMIN: 'ADMIN' };
        const STORAGE_KEY = 'eduportal_session';

        // ============================================
        // AUTH SERVICE
        // ============================================
        const AuthService = {
            users: [
                { id: 1, name: 'Admin User', email: 'admin@edu.com', password: 'Admin@123', role: 'ADMIN' },
                { id: 2, name: 'Dr. Sarah Smith', email: 'faculty@edu.com', password: 'Faculty@123', role: 'FACULTY' },
                { id: 3, name: 'John Student', email: 'student@edu.com', password: 'Student@123', role: 'STUDENT' }
            ],
            
            login: async (email, password, role) => {
                await new Promise(r => setTimeout(r, 800));
                const user = AuthService.users.find(u => 
                    u.email === email && u.password === password && u.role === role
                );
                if (!user) throw new Error("Invalid credentials or role mismatch");
                const { password: _, ...userData } = user;
                return { user: userData, token: 'jwt_' + btoa(email) };
            },
            
            signup: async (data) => {
                await new Promise(r => setTimeout(r, 800));
                if (AuthService.users.find(u => u.email === data.email)) {
                    throw new Error("Email already registered");
                }
                const newUser = { ...data, id: Date.now() };
                AuthService.users.push(newUser);
                const { password: _, ...userData } = newUser;
                return userData;
            }
        };

        // ============================================
        // AUTH CONTEXT
        // ============================================
        const AuthContext = createContext();

        const AuthProvider = ({ children }) => {
            const [user, setUser] = useState(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                return saved ? JSON.parse(saved) : null;
            });
            const [loading, setLoading] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (msg, type = 'info') => {
                setToast({ msg, type, id: Date.now() });
                setTimeout(() => setToast(null), 4000);
            };

            const login = async (email, password, role) => {
                setLoading(true);
                try {
                    const { user, token } = await AuthService.login(email, password, role);
                    setUser(user);
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(user));
                    showToast(`Welcome back, ${user.name}!`, 'success');
                    return true;
                } catch (err) {
                    showToast(err.message, 'error');
                    return false;
                } finally {
                    setLoading(false);
                }
            };

            const signup = async (data) => {
                setLoading(true);
                try {
                    const user = await AuthService.signup(data);
                    showToast('Account created! Please login.', 'success');
                    return true;
                } catch (err) {
                    showToast(err.message, 'error');
                    return false;
                } finally {
                    setLoading(false);
                }
            };

            const logout = () => {
                setUser(null);
                localStorage.removeItem(STORAGE_KEY);
                showToast('Logged out successfully', 'info');
            };

            return (
                <AuthContext.Provider value={{ user, login, signup, logout, loading, toast, showToast }}>
                    {children}
                </AuthContext.Provider>
            );
        };

        const useAuth = () => useContext(AuthContext);

        // ============================================
        // UI COMPONENTS
        // ============================================
        const Button = ({ children, variant = 'primary', size = 'md', loading, icon, className = '', ...props }) => {
            const variants = {
                primary: 'btn-primary text-white hover:opacity-90',
                secondary: 'bg-white/10 hover:bg-white/20 text-white border border-white/20',
                outline: 'btn-outline text-white hover:bg-white/5',
                ghost: 'text-slate-300 hover:text-white hover:bg-white/10',
                danger: 'bg-gradient-to-r from-red-600 to-pink-600 text-white hover:opacity-90'
            };
            const sizes = {
                sm: 'px-3 py-1.5 text-sm',
                md: 'px-5 py-2.5',
                lg: 'px-8 py-3 text-lg'
            };
            
            return (
                <button
                    className={`
                        inline-flex items-center justify-center gap-2 font-semibold rounded-xl
                        transition-all duration-300 active:scale-95 disabled:opacity-50
                        shadow-lg ${variants[variant]} ${sizes[size]} ${className}
                    `}
                    disabled={loading}
                    {...props}
                >
                    {loading && <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"/>}
                    {icon && <span>{icon}</span>}
                    {children}
                </button>
            );
        };

       const Input = ({ label, icon, error, type, className = '', ...props }) => {
    const [showPassword, setShowPassword] = useState(false);

    const isPassword = type === "password";

    return (
        <div className={`space-y-2 ${className}`}>
            {label && <label className="block text-sm font-medium text-slate-300">{label}</label>}
            
            <div className="relative group">
                {/* Left Icon */}
                {icon && (
                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-400 transition-colors">
                        {icon}
                    </div>
                )}

                {/* Input */}
                <input
                    type={isPassword ? (showPassword ? "text" : "password") : type}
                    className={`
                        w-full px-4 py-3 rounded-xl input-focus
                        bg-white/5 border border-white/10
                        text-white placeholder-slate-500
                        focus:outline-none focus:border-indigo-500
                        transition-all duration-300
                        ${icon ? 'pl-12' : ''}
                        ${isPassword ? 'pr-12' : ''}
                        ${error ? 'border-red-500 focus:border-red-500' : ''}
                    `}
                    {...props}
                />

                {/* 👁️ Toggle Icon */}
                {isPassword && (
                    <div
                        onClick={() => setShowPassword(!showPassword)}
                        className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-400 cursor-pointer transition"
                    >
                        {showPassword ? "🙈" : "👁️"}
                    </div>
                )}
            </div>

            {error && (
                <p className="text-xs text-red-400 flex items-center gap-1">
                    <span>⚠</span> {error}
                </p>
            )}
        </div>
    );
};

        const Select = ({ label, options, className = '', ...props }) => (
            <div className={`space-y-2 ${className}`}>
                {label && <label className="block text-sm font-medium text-slate-300">{label}</label>}
                <select
                    className="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white focus:outline-none focus:border-indigo-500 transition-all duration-300"
                    {...props}
                >
                    {options.map(opt => (
                        <option key={opt.value} value={opt.value} className="bg-slate-900">{opt.label}</option>
                    ))}
                </select>
            </div>
        );

        const Card = ({ children, className = '', hover = true, gradient = false }) => (
            <div className={`
                rounded-2xl p-6 card-line
                ${gradient 
                    ? 'bg-gradient-to-br from-indigo-600/20 to-purple-600/20' 
                    : 'glass-card'
                }
                ${hover ? 'hover-lift' : ''}
                ${className}
            `}>
                {children}
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm"></div>
                    <div 
                        className="relative w-full max-w-md glass-card rounded-3xl p-8 animate-scale-in"
                        onClick={e => e.stopPropagation()}
                    >
                        <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors text-xl">×</button>
                        {title && <h3 className="text-xl font-bold mb-6 text-gradient">{title}</h3>}
                        {children}
                    </div>
                </div>
            );
        };

        const Toast = ({ toast }) => {
            if (!toast) return null;
            const colors = {
                success: 'from-emerald-600 to-green-600',
                error: 'from-red-600 to-pink-600',
                info: 'from-indigo-600 to-purple-600'
            };
            const icons = { success: '✓', error: '✕', info: 'ℹ' };
            
            return (
                <div className={`fixed bottom-6 right-6 z-50 bg-gradient-to-r ${colors[toast.type]} px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 animate-slide-left`}>
                    <span className="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center font-bold">{icons[toast.type]}</span>
                    <span className="font-medium">{toast.msg}</span>
                </div>
            );
        };

        // ============================================
        // NAVIGATION BAR
        // ============================================
        const Navbar = ({ onOpenLogin, onOpenSignup, currentPage, setCurrentPage }) => {
            const { user, logout } = useAuth();
            const [scrolled, setScrolled] = useState(false);
            const [mobileOpen, setMobileOpen] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navItems = [
                { id: 'home', label: 'Home' },
                { id: 'features', label: 'Features' },
                { id: 'about', label: 'About' },
                { id: 'contact', label: 'Contact' }
            ];

            if (user) return null;

            return (
                <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${scrolled ? 'glass-dark py-3' : 'py-5'}`}>
                    <div className="max-w-7xl mx-auto px-6 flex items-center justify-between">
                        {/* Logo */}
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-600 to-purple-600 flex items-center justify-center font-bold text-lg animate-pulse-glow">
                                C
                            </div>
                            <span className="text-xl font-bold text-gradient">C-DAC Portal </span>
                        </div>

                        {/* Desktop Nav */}
                        <div className="hidden md:flex items-center gap-8">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setCurrentPage(item.id)}
                                    className={`text-sm font-medium transition-colors ${currentPage === item.id ? 'text-indigo-400' : 'text-slate-300 hover:text-white'}`}
                                >
                                    {item.label}
                                </button>
                            ))}
                        </div>

                        {/* Auth Buttons */}
                        <div className="hidden md:flex items-center gap-3">
                            <Button variant="ghost" onClick={onOpenLogin}>Sign In</Button>
                            <Button onClick={onOpenSignup}>Get Started</Button>
                        </div>

                        {/* Mobile Menu Button */}
                        <button className="md:hidden text-2xl" onClick={() => setMobileOpen(!mobileOpen)}>
                            {mobileOpen ? '×' : '☰'}
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    {mobileOpen && (
                        <div className="md:hidden glass-dark mt-2 mx-4 rounded-2xl p-6 animate-slide-down">
                            <div className="space-y-4">
                                {navItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => { setCurrentPage(item.id); setMobileOpen(false); }}
                                        className="block w-full text-left py-2 text-slate-300 hover:text-white"
                                    >
                                        {item.label}
                                    </button>
                                ))}
                                <div className="flex gap-3 pt-4 border-t border-white/10">
                                    <Button variant="outline" className="flex-1" onClick={onOpenLogin}>Sign In</Button>
                                    <Button className="flex-1" onClick={onOpenSignup}>Get Started</Button>
                                </div>
                            </div>
                        </div>
                    )}
                </nav>
            );
        };

        // ============================================
        // LANDING PAGE SECTIONS
        // ============================================
        const HeroSection = ({ onOpenSignup }) => (
            <section className="min-h-screen flex items-center justify-center relative overflow-hidden pt-20">
                {/* Background Elements */}
                <div className="absolute inset-0 bg-grid opacity-30"></div>
                <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-600/20 rounded-full blur-3xl animate-float"></div>
                <div className="absolute bottom-1/4 right-1/4 w-80 h-80 bg-purple-600/20 rounded-full blur-3xl animate-float-delayed"></div>
                
                {/* Floating Shapes */}
                <div className="absolute top-20 right-20 w-20 h-20 border border-indigo-500/30 rounded-2xl animate-float rotate-12"></div>
                <div className="absolute bottom-40 left-20 w-16 h-16 bg-gradient-to-br from-cyan-500 to-blue-500 rounded-full animate-float-delayed opacity-40"></div>
                
                <div className="relative z-10 max-w-6xl mx-auto px-6 text-center">
                    {/* Badge */}
                    <div className="inline-flex items-center gap-2 px-4 py-2 rounded-full glass-card mb-8 animate-slide-down">
                        <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                        <span className="text-sm text-slate-300">C-DAC Course Dashboard</span>
                    </div>
                    
                    {/* Main Heading */}
                    <h1 className="text-5xl md:text-7xl font-extrabold mb-6 animate-slide-up">
                        <span className="text-white">Transform Your Carrer</span>
                        <br />
                        <span className="text-gradient">C_DAC Banglore</span>
                    </h1>
                    
                    <p className="text-xl text-slate-400 max-w-2xl mx-auto mb-10 animate-slide-up delay-100">
                        A comprehensive role-based management system designed for modern institutions. 
                        Streamline operations, enhance learning, and empower educators.
                    </p>
                    
                    {/* CTA Buttons */}
                    <div className="flex flex-col sm:flex-row gap-4 justify-center animate-slide-up delay-200">
                        <Button size="lg" onClick={onOpenSignup} icon="→">
                            Create Account
                        </Button>
                       
                    </div>
                    
                    {/* Stats */}
                    <div className="grid grid-cols-3 gap-8 mt-20 animate-slide-up delay-300">
                        {[
                            { value: '10K+', label: 'Active Users' },
                            { value: '500+', label: 'Institutions' },
                            { value: '99.9%', label: 'Uptime' }
                        ].map((stat, i) => (
                            <div key={i} className="text-center">
                                <p className="text-3xl md:text-4xl font-bold text-gradient">{stat.value}</p>
                                <p className="text-sm text-slate-400 mt-1">{stat.label}</p>
                            </div>
                        ))}
                    </div>
                </div>
                
                {/* Scroll Indicator */}
                <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce-subtle">
                    <div className="w-6 h-10 border-2 border-white/20 rounded-full flex items-start justify-center p-2">
                        <div className="w-1 h-2 bg-white/40 rounded-full animate-bounce"></div>
                    </div>
                </div>
            </section>
        );

        const FeaturesSection = () => {
            const features = [
                { icon: '🔐', title: 'Role-Based Access', desc: 'Granular permissions for students, faculty, and administrators.' },
                { icon: '📊', title: 'Real-time Analytics', desc: 'Comprehensive dashboards with actionable insights.' },
                { icon: '📝', title: 'Exam Management', desc: 'Seamless exam scheduling and registration system.' },
                { icon: '👥', title: 'User Management', desc: 'Complete control over user accounts and permissions.' },
                { icon: '📱', title: 'Mobile Ready', desc: 'Fully responsive design that works on any device.' },
                { icon: '🔒', title: 'Enterprise Security', desc: 'Bank-level encryption and security protocols.' }
            ];

            return (
                <section className="py-24 relative">
                    <div className="max-w-6xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-4xl font-bold mb-4">Powerful <span className="text-gradient">Features</span></h2>
                            <p className="text-slate-400 max-w-2xl mx-auto">Everything you need to manage your educational institution efficiently.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {features.map((f, i) => (

        const SignupForm = ({ onSwitch, onClose }) => {
            const { signup, loading } = useAuth();
            const [form, setForm] = useState({ name: '', email: '', password: '', role: 'STUDENT' });
            const [errors, setErrors] = useState({});

            const validatePassword = (pw) => ({
                length: pw.length >= 8,
                upper: /[A-Z]/.test(pw),
                lower: /[a-z]/.test(pw),
                number: /[0-9]/.test(pw),
                special: /[@$!%*?&]/.test(pw)
            });

            const handleSubmit = async (e) => {
                e.preventDefault();
                const newErrors = {};
                if (!form.name) newErrors.name = 'Name is required';
                if (!form.email) newErrors.email = 'Email is required';
                if (!Object.values(validatePassword(form.password)).every(Boolean)) newErrors.password = 'Password requirements not met';
                setErrors(newErrors);
                if (Object.keys(newErrors).length > 0) return;
                
                const success = await signup(form);
                if (success) onSwitch();
            };

            const pwCheck = validatePassword(form.password);

            return (

                                {valid ? '✓' : '○'} {key}

                    </div>
                    <Select

                        options={[

                        <div className="space-y-3">
                            {['ML Fundamentals - 10:00 AM', 'AI Workshop - 2:00 PM', 'Lab Session - 4:00 PM'].map((c, i) => (
                                <div key={i} className="flex items-center justify-between p-3 rounded-xl bg-white/5 hover:bg-white/10 transition-colors">
                                    <span className="text-sm">{c}</span>
                                    <span className="text-xs text-indigo-400">Today</span>
                                </div>
                            ))}
                        </div>
                    </Card>
                    <Card>
                        <h3 className="font-bold mb-4">Recent Submissions</h3>
                        <div className="flex flex-col items-center justify-center h-40 text-slate-500">
                            <span className="text-4xl mb-2">📁</span>
                            <p className="text-sm">No pending submissions</p>
                        </div>
                    </Card>
                </div>
            </div>
        );

        const AdminDashboardContent = () => (
            <div className="space-y-6 animate-slide-up">
                <Card gradient className="p-8">
                    <div className="flex items-center justify-between">
                        <div>
                            <div className="flex items-center gap-2 mb-2">
                                <span className="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
                                <span className="text-sm text-slate-400">All Systems Operational</span>
                            </div>
                            <h2 className="text-2xl font-bold">Admin Control Center</h2>
                        </div>
                        <Button icon="📊">View Reports</Button>
                    </div>
                </Card>

                <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                    {[
                        { icon: '👥', label: 'Users', value: '1,482', change: '+12%' },
                        { icon: '👨‍🎓', label: 'Students', value: '1,245', change: '+8%' },
                        { icon: '👨‍🏫', label: 'Faculty', value: '187', change: '+3%' },
                        { icon: '⚙️', label: 'Uptime', value: '99.9%', change: '' }
                    ].map((s, i) => (
                        <Card key={i}>
                            <div className="flex justify-between items-start mb-2">
                                <span className="text-2xl">{s.icon}</span>
                                {s.change && <span className="text-xs text-emerald-400">{s.change}</span>}
                            </div>
                            <p className="text-2xl font-bold">{s.value}</p>
                            <p className="text-sm text-slate-400">{s.label}</p>
                        </Card>
                    ))}
                </div>

                <Card>
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="font-bold">User Management</h3>
                        <Button size="sm" icon="+">Add User</Button>
                    </div>
                    <table className="w-full">
                        <thead>
                            <tr className="border-b border-white/10">
                                <th className="text-left py-3 px-4 text-sm text-slate-400">User</th>
                                <th className="text-left py-3 px-4 text-sm text-slate-400">Role</th>
                                <th className="text-left py-3 px-4 text-sm text-slate-400">Status</th>
                                <th className="text-right py-3 px-4 text-sm text-slate-400">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {[
                                { name: 'Karanam Dattasai', email: 'dattasai@edu.com', role: 'Student', status: 'Active' },
                                { name: 'Dattu', email: 'dattu@edu.com', role: 'Faculty', status: 'Active' },
                                { name: 'sai', email: 'sai@edu.com', role: 'Student', status: 'Inactive' }
                            ].map((u, i) => (
                                <tr key={i} className="border-b border-white/5 hover:bg-white/5">
                                    <td className="py-4 px-4">
                                        <p className="font-medium">{u.name}</p>
                                        <p className="text-xs text-slate-500">{u.email}</p>
                                    </td>
                                    <td className="py-4 px-4"><span className="text-xs bg-indigo-600/20 text-indigo-400 px-2 py-1 rounded">{u.role}</span></td>
                                    <td className="py-4 px-4"><span className={`text-xs px-2 py-1 rounded ${u.status === 'Active' ? 'bg-emerald-600/20 text-emerald-400' : 'bg-red-600/20 text-red-400'}`}>{u.status}</span></td>
                                    <td className="py-4 px-4 text-right">
                                        <Button variant="ghost" size="sm">Edit</Button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </Card>
            </div>
        );

        // ============================================
        // MAIN APP
        // ============================================
        const App = () => {
            const { user, toast, logout } = useAuth();
            const [currentLandingPage, setCurrentLandingPage] = useState('home');
            const [showLogin, setShowLogin] = useState(false);
            const [showSignup, setShowSignup] = useState(false);
            const [dashboardPage, setDashboardPage] = useState('dashboard');
            const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

            // Landing Page
            if (!user) {
                return (
                    <div className="min-h-screen relative noise">
                        <Navbar 
                            onOpenLogin={() => setShowLogin(true)}
                            onOpenSignup={() => setShowSignup(true)}
                            currentPage={currentLandingPage}
                            setCurrentPage={setCurrentLandingPage}
                        />
                        
                        <HeroSection onOpenSignup={() => setShowSignup(true)} />
                        <FeaturesSection />
                        <RolesSection />
                        <CTASection onOpenSignup={() => setShowSignup(true)} />
                        <Footer />

                        {/* Auth Modals */}
                        <Modal isOpen={showLogin} onClose={() => setShowLogin(false)} title="Sign In">
                            <LoginForm onSwitch={() => { setShowLogin(false); setShowSignup(true); }} onClose={() => setShowLogin(false)} />
                        </Modal>
                        <Modal isOpen={showSignup} onClose={() => setShowSignup(false)} title="Create Account">
                            <SignupForm onSwitch={() => { setShowSignup(false); setShowLogin(true); }} onClose={() => setShowSignup(false)} />
                        </Modal>

                        <Toast toast={toast} />
                    </div>
                );
            }

            // Dashboard
            return (
                <div className="min-h-screen relative noise">
                    <DashboardSidebar 
                        collapsed={sidebarCollapsed}
                        setCollapsed={setSidebarCollapsed}
                        currentPage={dashboardPage}
                        setCurrentPage={setDashboardPage}
                    />
                    <div className={`transition-all duration-500 ${sidebarCollapsed ? 'ml-20' : 'ml-72'}`}>
                        <DashboardHeader collapsed={sidebarCollapsed} />
                        <main className="p-6">
                            {user.role === 'STUDENT' && <StudentDashboardContent />}
                            {user.role === 'FACULTY' && <FacultyDashboardContent />}
                            {user.role === 'ADMIN' && <AdminDashboardContent />}
                        </main>
                    </div>
                    <Toast toast={toast} />
                </div>
            );
        };

        // ============================================
        // ROOT
        // ============================================
        const Root = () => (
            <AuthProvider>
                <App />
            </AuthProvider>
        );

        ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
    </script>
</body>
</html>
